name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Permisos máximos requeridos por GitHub Actions para desplegar Pages
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      # Este paso evita que el flujo falle si tu compilación usa otra carpeta (ej. 'build' o 'out')
      - name: Ensure build folder exists
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: La carpeta 'dist' no existe tras el build."
            echo "Verificando si se generó otra carpeta..."
            ls -la
            exit 1
          fi

      # Forzar la configuración interna del entorno seguro de GitHub
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
